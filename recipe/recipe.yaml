schema_version: 1

context:
  name: mujoco-warp
  version: 3.6.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mujoco_warp-${{ version }}.tar.gz
  sha256: 3c4111a4e13dc61268ddac52593ac5032c05a7d80f0c5e3c98bf5881e32b5d06

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - absl-py
    - mujoco >=3.5.0
    - numpy
    - python >=${{ python_min }}
    - warp-lang >=1.12
    - etils
    - mujoco-python
tests:
  - python:
      imports:
        - mujoco_warp
      pip_check: true
      # Tests fail with default python_min (3.10) because a very old version of jaxlib is installed.
      # https://github.com/conda-forge/warp-lang-feedstock/issues/83
      python_version: 3.11.*
  - script:
      # The mujoco_warp package bundles the tests in the package, so we can run them from there.
      - if: not win
        then:
          - pytest --pyargs mujoco_warp
        else:
          - pytest --pyargs mujoco_warp -k "not test_collision20"
    files:
      source:
        - pyproject.toml
    requirements:
      run:
        - pip
        - pytest
        - python 3.11.*
        # jax_test.py uses `scipy.linalg.tril`, which was removed in scipy 1.13.0.
        - scipy <1.13.0

about:
  homepage: https://github.com/google-deepmind/mujoco_warp
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/google-deepmind/mujoco_warp
  summary: GPU-optimized version of the MuJoCo physics simulator, designed for NVIDIA hardware.

extra:
  recipe-maintainers:
    - diegoferigo
    - oursland
    - traversaro
